name: fitora
description: "Fitora - Smart Gym Management & Fitness App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  cached_network_image: ^3.4.1
  cloud_firestore: ^6.1.3
  firebase_auth: ^6.2.0
  firebase_core: ^4.5.0
  firebase_storage: ^13.1.0
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  http: ^1.6.0
  image_picker: ^1.2.1
  intl: ^0.19.0
  lottie: ^3.1.2
  smooth_page_indicator: ^1.2.0+3
  timeago: ^3.7.1
  youtube_player_flutter: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/


